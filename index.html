<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Pink Archive</title>
    <link id="tab-icon" rel="icon" href="https://raw.githubusercontent.com/google/material-design-icons/master/png/action/extension/res/mipmap-mdpi/ic_extension_black_24dp.png" type="image/x-icon">

    <style>
        :root {
            --bg-main: #fec1d3;
            --sidebar-bg: #ffdbe6;
            --accent: #ff7da1;
            --accent-hover: #ff5e8c;
            --text-main: #6d2a3d;
            --card-bg: #fff0f5;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); overflow: hidden; }

        header {
            padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
            background: rgba(254, 193, 211, 0.9); backdrop-filter: blur(15px);
            position: fixed; top: 0; width: 100%; z-index: 100; border-bottom: 3px solid white;
        }

        .header-left { display: flex; align-items: center; }
        .menu-btn, .home-btn { background: none; border: none; color: var(--accent); font-size: 1.8rem; cursor: pointer; transition: var(--transition); }
        .home-btn { margin-left: 15px; }

        #sidebar {
            position: fixed; left: -410px; top: 0; width: 400px; height: 100%;
            background: var(--sidebar-bg); box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            z-index: 2000; transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; border-right: 4px solid white;
        }
        #sidebar.open { left: 0; }
        .sidebar-header { padding: 25px 25px 10px 25px; display: flex; justify-content: space-between; align-items: center; }
        
        .sidebar-tabs { display: flex; padding: 0 25px; gap: 5px; border-bottom: 2px solid white; }
        .tab-link { padding: 10px; cursor: pointer; font-weight: bold; font-size: 0.85rem; color: var(--accent); opacity: 0.6; }
        .tab-link.active { opacity: 1; border-bottom: 3px solid var(--accent); }

        .sidebar-content { flex: 1; overflow-y: auto; display: none; padding: 20px; }
        .sidebar-content.active { display: block; }

        .folder-bar { display: flex; overflow-x: auto; padding: 10px 0; gap: 10px; margin-bottom: 10px; white-space: nowrap; }
        .folder { display: inline-flex; min-width: 40px; height: 40px; border-radius: 10px; background: white; color: var(--accent); align-items: center; justify-content: center; cursor: pointer; font-weight: bold; transition: var(--transition); flex-shrink: 0; }
        .folder.active { background: var(--accent); color: white; transform: translateY(-3px); }

        .custom-input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid white; outline: none; margin-bottom: 10px; background: white; color: var(--text-main); }
        .game-card { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 2px solid white; }
        
        .play-btn { background: var(--accent); border: none; color: white; padding: 8px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: var(--transition); }
        .play-btn:hover { background: var(--accent-hover); }

        .main-container { height: 100vh; padding-top: 80px; display: flex; align-items: center; justify-content: center; }
        #welcome-view { text-align: center; }
        #game-view { width: 92%; max-width: 1100px; height: 75vh; background: white; border-radius: 25px; position: relative; border: 5px solid white; display: none; }
        #preview-frame { width: 100%; height: 100%; border: none; border-radius: 20px; background: white; }
        
        .game-header-btns { position: absolute; top: -20px; right: 10px; display: flex; gap: 10px; z-index: 10; }
        .circle-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 1500; }
        #overlay.active { display: block; }
        #game-loader { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent); font-weight: bold; }
        
        #connection-status { position: fixed; bottom: 10px; right: 10px; font-size: 10px; padding: 5px 10px; border-radius: 20px; background: rgba(255,255,255,0.5); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar()">✿</button>
            <h2 style="letter-spacing: 2px; color: var(--accent); font-weight: 300;">PINK<span style="font-weight: 800;">ARCHIVE</span></h2>
        </div>
        <button class="home-btn" onclick="goHome()">🏠</button>
    </header>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <h3 style="color: var(--accent); font-weight: 400; letter-spacing: 1px;">CATALOG</h3>
            <button class="play-btn" style="padding: 5px 10px;" onclick="toggleSidebar()">✕</button>
        </div>

        <div class="sidebar-tabs">
            <div class="tab-link active" onclick="switchTab('games', this)">Games</div>
            <div class="tab-link" onclick="switchTab('disguise', this)">Disguise</div>
        </div>

        <div id="games-tab" class="sidebar-content active">
            <input type="text" id="game-search" class="custom-input" placeholder="Search archive..." onkeyup="searchGames()">
            <div class="folder-bar" id="folder-bar"></div>
            <div id="game-list"></div>
        </div>

        <div id="disguise-tab" class="sidebar-content">
            <label style="font-size: 0.8rem; font-weight: bold; color: var(--accent);">TAB NAME</label>
            <input type="text" id="manual-name" class="custom-input" placeholder="e.g. My Drive">
            <label style="font-size: 0.8rem; font-weight: bold; color: var(--accent);">FAVICON URL</label>
            <input type="text" id="manual-icon" class="custom-input" placeholder="Paste image URL here...">
            <button class="play-btn" style="width:100%" onclick="applyManualDisguise()">Apply Changes</button>
        </div>
    </aside>

    <main class="main-container">
        <div id="welcome-view">
            <h1 style="font-size: 3.5rem; color: var(--accent); font-weight: 800; letter-spacing: 2px;">PINKARCHIVE</h1>
            <p style="opacity: 0.6;">Vercel Instance - Ported Gist</p>
        </div>
        <div id="game-view">
            <div id="game-loader">INJECTING RAW CODE...</div>
            <div class="game-header-btns">
                <button class="circle-btn" onclick="toggleFullScreen()">⛶</button>
                <button class="circle-btn" onclick="goHome()">✕</button>
            </div>
            <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock" allow="fullscreen"></iframe>
        </div>
    </main>

    <div id="connection-status">CHECKING CONNECTION...</div>

    <script>
        // 1. YOUR RAW GIST URL FOR THE GAMES LIST
        const GIST_URL = 'https://gist.githubusercontent.com/Foxx09p/8aec57b79cc19a212b6db1074739d493/raw/7fb4dc9778d083f0b63345ae858c8a1ecc205e9a/games.json';
        
        let allGames = [];
        let currentFilter = '0-9';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-content').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }

        function applyManualDisguise() {
            const name = document.getElementById('manual-name').value;
            const icon = document.getElementById('manual-icon').value;
            if (name) document.title = name;
            if (icon) document.getElementById('tab-icon').href = icon;
        }

        const alphabet = "#ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
        const fBar = document.getElementById('folder-bar');
        alphabet.forEach(char => {
            const f = document.createElement('div');
            f.className = 'folder' + (char === '#' ? ' active' : '');
            f.innerText = char;
            f.onclick = () => {
                document.querySelectorAll('.folder').forEach(el => el.classList.remove('active'));
                f.classList.add('active');
                currentFilter = (char === '#' ? '0-9' : char);
                renderGames();
            };
            fBar.appendChild(f);
        });

        async function loadGames() {
            const status = document.getElementById('connection-status');
            try {
                // Fetch the main JSON list
                const res = await fetch(GIST_URL + "?cb=" + Date.now());
                if (res.ok) {
                    allGames = await res.json();
                    renderGames();
                    status.innerText = "ONLINE";
                    status.style.color = "green";
                }
            } catch(e) { 
                status.innerText = "OFFLINE (BLOCKED)";
                status.style.color = "red";
            }
        }

        function renderGames(filterList = null) {
            const list = document.getElementById('game-list');
            list.innerHTML = '';
            const toRender = filterList || allGames.filter(g => 
                currentFilter === '0-9' ? /^\d/.test(g.name) : g.name.toUpperCase().startsWith(currentFilter)
            );
            toRender.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                // Using findIndex to ensure we get the correct index for the allGames array
                const index = allGames.indexOf(game);
                card.innerHTML = `<span>${game.name}</span><button class="play-btn" onclick="playGame(${index})">Play</button>`;
                list.appendChild(card);
            });
        }

        function searchGames() {
            const q = document.getElementById('game-search').value.toLowerCase();
            renderGames(allGames.filter(g => g.name.toLowerCase().includes(q)));
        }

        async function playGame(i) {
            const loader = document.getElementById('game-loader');
            const frame = document.getElementById('preview-frame');
            const game = allGames[i];
            
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            loader.style.display = 'block';
            
            // Reset frame content
            frame.srcdoc = "";
            frame.src = "about:blank";

            try {
                // Fetch the RAW HTML code from the URL provided in the JSON
                const response = await fetch(game.url + "?cb=" + Date.now());
                if (!response.ok) throw new Error("Fetch failed");
                
                const rawHtmlCode = await response.text();
                
                // Set the fetched code as the iframe source
                frame.srcdoc = rawHtmlCode;
            } catch (err) {
                console.error("Error loading raw HTML:", err);
                frame.srcdoc = `<div style="color: #ff7da1; font-family: sans-serif; text-align: center; padding: 50px;">
                    <h2>Load Failed</h2>
                    <p>Could not fetch the raw code from the Gist.</p>
                </div>`;
            } finally {
                loader.style.display = 'none';
                // Close sidebar after clicking play
                if (document.getElementById('sidebar').classList.contains('open')) {
                    toggleSidebar();
                }
            }
        }

        function goHome() {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('welcome-view').style.display = 'block';
            document.getElementById('preview-frame').srcdoc = '';
        }

        function toggleFullScreen() {
            const frame = document.getElementById('preview-frame');
            if (!document.fullscreenElement) {
                if (frame.requestFullscreen) frame.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        window.onload = loadGames;
    </script>
</body>
</html>
